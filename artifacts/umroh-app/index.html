<html lang="id">

    <!-- Open Graph (fallback untuk crawler yang tidak eksekusi JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vins Tour Travel" />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:title" content="Vins Tour Travel - Perjalanan Terbaik Menuju Baitullah" />
    <meta property="og:description" content="Paket umroh terbaik dengan pelayanan premium, hotel bintang 5, dan bimbingan ustadz berpengalaman." />
    <!-- og:url is emitted per-route by SEO component to follow tenant domain -->
    <meta property="og:image" content="/opengraph.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vins Tour Travel - Perjalanan Terbaik Menuju Baitullah" />
    <meta name="twitter:description" content="Paket umroh terbaik dengan pelayanan premium, hotel bintang 5, dan bimbingan ustadz berpengalaman." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- hreflang alternates are emitted per-route by SEO component to follow tenant domain -->


    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Vins Tour Travel",
        "url": "/",
        "description": "Paket umroh terbaik dengan pelayanan premium, hotel bintang 5, dan bimbingan ustadz berpengalaman.",
        "areaServed": "ID",
        "priceRange": "$$",
        "address": { "@type": "PostalAddress", "addressCountry": "ID" },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["Indonesian", "English"]
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Vins Tour Travel",
        "url": "/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "/paket?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
