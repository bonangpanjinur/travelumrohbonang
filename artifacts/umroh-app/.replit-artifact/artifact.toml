kind = "web"
previewPath = "/"
title = "Umroh App"
version = "1.0.0"
id = "artifacts/umroh-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20816

[services.development]
run = "pnpm --filter @workspace/umroh-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/umroh-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/umroh-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20816"
BASE_PATH = "/"
